<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>I'm Sorry Maanuu ❤️</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        overflow: hidden;
        color: white;
        text-align: center;
    }

    .container {
        margin-top: 12vh;
        padding: 20px;
    }

    h1 {
        font-size: 3rem;
        animation: pulse 2s infinite;
    }

    p {
        font-size: 1.3rem;
        max-width: 700px;
        margin: auto;
        line-height: 1.8;
    }

    .buttons {
        margin-top: 40px;
        position: relative;
        height: 200px;
    }

    button {
        border: none;
        padding: 15px 30px;
        font-size: 1.1rem;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.3s;
        margin: 10px;
    }

    #yesBtn {
        background: white;
        color: #ff4f81;
        font-weight: bold;
    }

    #yesBtn:hover {
        transform: scale(1.1);
    }

    #noBtn {
        background: #ff1744;
        color: white;
        position: absolute;
    }

    #maybeBtn {
        background: #ffd54f;
        color: black;
    }

    .hidden {
        display: none;
    }

    #message {
        margin-top: 30px;
        font-size: 1.5rem;
        animation: fadeIn 1s ease;
    }

    .heart {
        position: fixed;
        color: red;
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes float {
        from {
            transform: translateY(100vh);
            opacity: 1;
        }
        to {
            transform: translateY(-10vh);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>I'm Really Sorry Baby Garrll❤️</h1>

    <p id="text">
        I know I made mistakes...  
        But losing your smile hurts more than anything.  
        You mean everything to me 🥺  
        Can you please forgive me?
    </p>

    <div class="buttons">
        <button id="yesBtn">Forgive Me ❤️</button>
        <button id="maybeBtn">Maybe... 🤔</button>
        <button id="noBtn">No 😒</button>
    </div>

    <div id="message" class="hidden"></div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const maybeBtn = document.getElementById("maybeBtn");
    const message = document.getElementById("message");

    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * 300;
        const y = Math.random() * 150;
        noBtn.style.left = `${x}px`;
        noBtn.style.top = `${y}px`;
    });

    maybeBtn.addEventListener("click", () => {
        message.classList.remove("hidden");
        message.innerHTML =
            "I promise to do better, make you smile more, and annoy you less 😭❤️";
    });

    yesBtn.addEventListener("click", () => {
        message.classList.remove("hidden");
        message.innerHTML =
            "❤️ Thank you for forgiving me 🥺✨ I love you forever My Cutiieeffuulll!";

        startHearts();
    });

    function startHearts() {
        setInterval(() => {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 20 + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }, 200);
    }
</script>

</body>
</html>
